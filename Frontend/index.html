<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Helper</title>
 
  <!-- Google Fonts: Space Grotesk (headings/brand), Inter (body), JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
 
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- ============================================================
         SIDEBAR
         Holds the brand mark, "New chat" action, and the running
         list of conversations started during this session.
         ============================================================ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L14.2 9.2L21 12L14.2 14.8L12 22L9.8 14.8L3 12L9.8 9.2L12 2Z" />
            </svg>
          </span>
          <span class="brand-name">My Helper</span>
        </div>
        <button class="icon-btn" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
 
      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>
 
      <div class="sidebar-section-label">Recent</div>
      <nav class="conversation-list" id="conversationList">
        <!-- Conversation entries are injected here by script.js -->
      </nav>
 
      <div class="sidebar-footer">
        <button class="ghost-btn" id="clearChatBtn">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Clear chat
        </button>
        <div class="footer-hint">
          <kbd>Ctrl</kbd> + <kbd>K</kbd> new chat &nbsp;·&nbsp; <kbd>Esc</kbd> clear input
        </div>
      </div>
    </aside>
 
    <!-- ============================================================
         MAIN CHAT AREA
         ============================================================ -->
    <main class="chat-area">
      <header class="chat-header">
        <button class="icon-btn mobile-only" id="mobileSidebarToggle" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="chat-title-wrap">
          <h1 class="chat-title" id="chatTitle">New conversation</h1>
          <span class="status-dot" id="statusDot" title="Connected"></span>
        </div>
      </header>
 
      <!-- Scrollable message log -->
      <section class="chat-window" id="chatWindow" aria-live="polite">
        <div class="empty-state" id="emptyState">
          <div class="empty-orb" aria-hidden="true"></div>
          <h2>My Helper is ready when you are</h2>
          <p>Ask a question, brainstorm an idea, or paste some code for a review.</p>
          <div class="suggestion-chips">
            <button class="chip" data-prompt="Explain async/await in JavaScript with a simple example.">Explain async/await</button>
            <button class="chip" data-prompt="Write a Python function that reverses a linked list.">Reverse a linked list</button>
            <button class="chip" data-prompt="Give me 5 creative names for a coffee shop.">Name a coffee shop</button>
          </div>
        </div>
        <!-- Message bubbles are injected here by script.js -->
      </section>
 
      <!-- Typing indicator (shown while waiting on the API) -->
<div class="typing-indicator" id="typingIndicator" style="display:none;">
        <span class="typing-avatar" aria-hidden="true"></span>

        <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

      <!-- Composer / input bar -->
      <footer class="composer">
        <form id="chatForm" class="composer-form">
          <textarea
            id="messageInput"
            class="composer-input"
            placeholder="Message My Helper..."
            rows="1"
            maxlength="4000"
            autofocus
          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24"><path d="M4 12L20 4L14 20L11 13L4 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>
          </button>
        </form>
        <div class="composer-hint">My Helper can make mistakes. Verify important information.</div>
      </footer>
    </main>
  </div>
 
  <!-- Toast notification container -->
  <div class="toast-container" id="toastContainer"></div>
 
  <script src="script.js"></script>
</body>
</html>
